name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper (if missing)
        run: test -f gradlew || gradle wrapper --gradle-version=8.5

      - run: ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_androidKeystorePath: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_androidKeystorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_androidKeyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_androidKeyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/outputs/apk/release/*.apk"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-apk

      - name: Generate Release Notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            git log "$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD" --oneline
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "release-apk/*.apk"
          body: ${{ steps.notes.outputs.notes }}
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
